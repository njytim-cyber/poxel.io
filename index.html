<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Poxel.io - Minecraft Web Clone</title>
    <link rel="stylesheet" href="./style.css">

  </head>
  <body>
    <div id="mobile-hud" style="display: none;">
        <div id="joystick-zone"></div>
        <div id="touch-look-zone"></div>
        <button class="mobile-btn mobile-btn-menu" id="btn-mobile-menu">☰</button>
        <div id="action-buttons-left">
            <button class="mobile-btn mobile-btn-lg" id="btn-mobile-jump">⬆<br><span>Jump</span></button>
            <button class="mobile-btn" id="btn-mobile-sprint">🏃<br><span>Run</span></button>
            <button class="mobile-btn" id="btn-mobile-sneak">🐾<br><span>Snk</span></button>
        </div>
        <div id="action-buttons-right">
            <button class="mobile-btn mobile-btn-lg mobile-btn-action" id="btn-mobile-hit">⛏<br><span>Mine</span></button>
            <button class="mobile-btn mobile-btn-lg mobile-btn-place" id="btn-mobile-place">🧱<br><span>Place</span></button>
        </div>
        <div id="mobile-toolbar">
            <button class="mobile-btn mobile-btn-sm" id="btn-mobile-inv">📦</button>
            <button class="mobile-btn mobile-btn-sm" id="btn-mobile-shop">🛒</button>
            <button class="mobile-btn mobile-btn-sm" id="btn-mobile-save">💾</button>
        </div>
    </div>

    <div id="ui">
      <div id="crosshair">+</div>
      <div id="instructions" style="display: none;">
        <h2>Click to Play</h2>
        <p>
          Move: WASD or Arrow Keys<br />
          Run: Hold R<br />
          Mine: Long Press (0.5s)<br />
          Place: Short Click (Tap)<br />
          Select tool: 1-5 keys<br />
          Toggle View: V or F5 or F7
        </p>
        <button id="btn-save-quit" style="padding: 10px 20px; font-size: 16px; cursor: pointer; pointer-events: auto; margin-top: 15px; color: black;">Save & Quit</button>
      </div>

      <div id="debug" style="position: absolute; top: 10px; left: 10px; color: yellow; z-index: 9999; font-size: 16px; background: rgba(0,0,0,0.5); padding: 10px;"></div>

      <div id="full-inventory-modal" style="display: none;">
        <div id="modal-container">
            <div id="crafting-area">
                <h3 id="crafting-title">Crafting</h3>
                <div id="crafting-grid-container">
                    <div id="crafting-grid" class="grid-2x2"></div>
                    <div id="crafting-arrow">➜</div>
                    <div id="crafting-result"></div>
                </div>
            </div>
            <div id="inventory-area">
                <h3>Inventory</h3>
                <div id="full-inventory-grid"></div>
            </div>
            <div id="armor-area" style="display: flex; flex-direction: column; align-items: center;">
                <h3>Armor</h3>
                <div id="armor-grid" style="display: flex; flex-direction: column; gap: 10px;"></div>
            </div>
        </div>
      </div>

      <div id="inventory-bar">
      </div>
      
      <div id="armor-hud">
      </div>
    </div>

    <!-- Main Menu Overlay -->
    <div id="main-menu">
      <div class="menu-content" id="menu-screen-main">
        <h1>Poxel.io</h1>
        <button id="btn-new-game" class="menu-btn primary">
          <span>New Game</span>
          <div class="bp-anim anim-jump">
              <div class="bp-head"></div><div class="bp-body"></div>
              <div class="bp-arm l"></div><div class="bp-arm r"></div>
              <div class="bp-leg l"></div><div class="bp-leg r"></div>
          </div>
        </button>
        <button id="btn-open-load" class="menu-btn">
          <span>Load Game</span>
          <div class="bp-anim anim-mine">
              <div class="bp-head"></div><div class="bp-body"></div>
              <div class="bp-arm l"></div>
              <div class="bp-arm r"><div class="bp-pick"></div></div>
              <div class="bp-leg l"></div><div class="bp-leg r"></div>
          </div>
        </button>
        
        <button id="btn-shop" class="menu-btn">
          <span>Shop</span>
        </button>

        <button id="btn-multiplayer" class="menu-btn disabled" disabled style="overflow: hidden;">
          Multiplayer
          <span class="coming-soon">Coming Soon</span>
          <div class="red-cross"></div>
        </button>
      </div>

      <div class="menu-content" id="save-slots-container" style="display: none;">
        <h2>Select Save</h2>
        <div id="save-slots">
            <button class="save-slot load-btn menu-btn" data-slot="0">Empty Slot 1</button>
            <button class="save-slot load-btn menu-btn" data-slot="1">Empty Slot 2</button>
            <button class="save-slot load-btn menu-btn" data-slot="2">Empty Slot 3</button>
            <button class="save-slot load-btn menu-btn" data-slot="3">Empty Slot 4</button>
            <button class="save-slot load-btn menu-btn" data-slot="4">Empty Slot 5</button>
        </div>
        <button id="btn-back-load" class="menu-btn" style="margin-top: 20px;">Back</button>
      </div>

      <div class="menu-content shop-layout" id="shop-screen" style="display: none;">
        <div class="shop-preview">
           <canvas id="shop-canvas"></canvas>
        </div>
        <div class="shop-controls">
            <h2>Character Shop</h2>
            <div class="shop-tabs">
                <button class="shop-tab active" data-tab="skin">Skin</button>
                <button class="shop-tab" data-tab="shirt">Shirt</button>
                <button class="shop-tab" data-tab="hair">Hair</button>
                <button class="shop-tab" data-tab="eyes">Eyes</button>
                <button class="shop-tab super-shop-tab" data-tab="super">★ Super ★</button>
            </div>
            
            <div id="tab-skin" class="shop-tab-content active">
                <div class="swatch-grid" id="grid-skin"></div>
            </div>
            <div id="tab-shirt" class="shop-tab-content">
                <div class="swatch-grid" id="grid-shirt"></div>
            </div>
            <div id="tab-pants" class="shop-tab-content">
                <div class="swatch-grid" id="grid-pants"></div>
            </div>
            <div id="tab-hair" class="shop-tab-content">
                <h3 style="color:white; margin-bottom: 10px; text-align: left; font-size: 16px;">Hair Style</h3>
                <div style="display:flex; gap: 10px; margin-bottom: 20px;" id="grid-hair-style">
                    <button class="shop-tab active" data-style="0">Flat</button>
                    <button class="shop-tab" data-style="1">Spike</button>
                    <button class="shop-tab" data-style="2">Tall</button>
                </div>
                <h3 style="color:white; margin-bottom: 10px; text-align: left; font-size: 16px;">Hair Color</h3>
                <div class="swatch-grid" id="grid-hair"></div>
            </div>
            <div id="tab-eyes" class="shop-tab-content">
                <h3 style="color:white; margin-bottom: 10px; text-align: left; font-size: 16px;">Eye Color</h3>
                <div class="swatch-grid" id="grid-eyes"></div>
            </div>
            
            <div id="tab-super" class="shop-tab-content">
                <div class="super-shop-grid" id="grid-super"></div>
            </div>

            <button id="btn-save-shop" class="menu-btn" style="margin-top: 20px; justify-content: center; width: 100%;">Save & Back</button>
        </div>
      </div>
    </div>

    <!-- Homes Sidebar -->
    <div id="homes-sidebar">
      <h3>Etherite Homes</h3>
      <ul id="homes-list">
        <!-- Dynamically populated -->
      </ul>
      <p class="home-hint">Press 'H' to set home</p>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
